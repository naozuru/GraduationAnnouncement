<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Graduation Announcement</title>

    <!-- FAVICON -->
    <link rel="icon" href="tmi_logo.png" />

    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- =========================
         LOGIN PAGE
    ========================== -->
    <div class="container" id="loginPage">
      <div class="header">
        <img src="tmi_logo.png" class="logo" />
        <h1>Graduation Announcement</h1>
        <h3>Senior High School</h3>
        <h4>Tunas Mekar Indonesia</h4>
      </div>

      <h2>Check Your Result</h2>

      <form id="loginForm">
        <input type="text" id="nisn" placeholder="Enter NISN" required />
        <input type="password" id="nis" placeholder="Enter NIS" required />
        <button type="submit">Check Result</button>
      </form>

      <p id="errorMsg"></p>
    </div>

    <!-- =========================
         RESULT PAGE
    ========================== -->
    <div class="container hidden" id="resultPage">
      <!-- 🔥 TIMER -->
      <div id="timer" class="timer">⏱ 0s</div>

      <!-- HEADER -->
      <div class="header">
        <img src="tmi_logo.png" class="logo" />
        <h1>Graduation Announcement</h1>
        <h3>Senior High School</h3>
        <h4>Tunas Mekar Indonesia</h4>
      </div>

      <h2>Student Information</h2>

      <!-- CONTENT -->
      <div class="result-content">
        <!-- FOTO -->
        <div class="left">
          <img id="studentPhoto" />
        </div>

        <!-- DATA -->
        <div class="right">
          <div class="data">
            <p><strong>Name:</strong> <span id="name"></span></p>
            <p><strong>NISN:</strong> <span id="nisnResult"></span></p>
            <p><strong>Date of Birth:</strong> <span id="dob"></span></p>
            <p><strong>Status:</strong> <span id="statusText">???</span></p>
          </div>
        </div>
      </div>

      <!-- =========================
           🎮 MINI GAME AREA
      ========================== -->
      <div id="gameArea" class="game-area">
        <!-- TIMER PINDAH KE SINI -->
        <div id="timer" class="timer">⏱ 0s</div>

        <p id="gameText">Click the circle to reveal your graduation result</p>

        <div id="circle"></div>
      </div>

      <!-- BUTTON -->
      <button onclick="logout()">Back</button>
    </div>

    <!-- =========================
         MODAL RESULT
    ========================== -->
    <div id="resultModal" class="modal hidden">
      <div class="modal-content">
        <h2 id="modalTitle"></h2>
        <p class="modal-name" id="modalName"></p>
        <p class="modal-message" id="modalMessage"></p>

        <button onclick="closeModal()">OK</button>
      </div>
    </div>

    <!-- =========================
         SCRIPT
    ========================== -->
    <script src="script.js"></script>
  </body>
</html>
